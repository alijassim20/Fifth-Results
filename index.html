<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .subject {
            color: gold;
            font-weight: bold;
        }
        .grade {
            font-weight: bold;
        }
        .grade.red {
            color: red;
        }
        .grade.orange {
            color: orange;
        }
        .grade.green {
            color: green;
        }
    </style>
</head>
<body>
    <h1>Student Results System</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th class="subject">Subject</th>
                <th class="grade">Grade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John Doe</td>
                <td class="subject">Mathematics</td>
                <td class="grade red">45</td>
            </tr>
            <tr>
                <td>Jane Smith</td>
                <td class="subject">Physics</td>
                <td class="grade orange">75</td>
            </tr>
            <tr>
                <td>Emily Johnson</td>
                <td class="subject">Chemistry</td>
                <td class="grade green">90</td>
            </tr>
            <!-- Add more students as needed -->
        </tbody>
    </table>
</body>
</html>
